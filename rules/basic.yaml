id: basic
version: "1.0.0"

deck:
  cards:
    - value: 0
      count: 2
    - value: 1
      count: 4
    - value: 2
      count: 4
    - value: 3
      count: 4
    - value: 4
      count: 4
    - value: 5
      count: 4
    - value: 6
      count: 4
    - value: 7
      count: 4
    - value: 8
      count: 4
    - value: 9
      count: 4

strategies:
  - id: Aggro
    effect:
      id: "basic:aggro"
      trigger:
        type: on_card_played
      target:
        type: self
      action:
        type: multiply_effective_value
        factor: 2
      usageLimit: null

  - id: Control-Add
    effect:
      id: "basic:controlAdd"
      trigger:
        type: on_card_played_by_other
      target:
        type: field_card
      action:
        type: change_operation
        from: sub
        to: add
      constraints:
        - type: usage_limit_per_game
          limit: 1
        - type: no_retroactive
      usageLimit: 1

  - id: Control-Sub
    effect:
      id: "basic:controlSub"
      trigger:
        type: on_card_played_by_other
      target:
        type: field_card
      action:
        type: change_operation
        from: add
        to: sub
      constraints:
        - type: usage_limit_per_game
          limit: 1
        - type: no_retroactive
      usageLimit: 1

  - id: Control-Div
    effect:
      id: "basic:controlDiv"
      trigger:
        type: on_card_played_by_other
      target:
        type: field_card
      action:
        type: change_operation
        from: mul
        to: div
      constraints:
        - type: usage_limit_per_game
          limit: 1
        - type: no_retroactive
      usageLimit: 1

  - id: Control-Mul
    effect:
      id: "basic:controlMul"
      trigger:
        type: on_card_played_by_other
      target:
        type: field_card
      action:
        type: change_operation
        from: div
        to: mul
      constraints:
        - type: usage_limit_per_game
          limit: 1
        - type: no_retroactive
      usageLimit: 1

  - id: Hack
    effect:
      id: "basic:hack"
      trigger:
        type: on_card_played_by_other
      target:
        type: field_card
      action:
        type: steal_card
      constraints:
        - type: usage_limit_per_game
          limit: 1
        - type: no_retroactive
        - type: card_parity
          parity: even
      usageLimit: 1

  - id: TrickStar
    effect:
      id: "basic:trickStar"
      trigger:
        type: on_card_played_by_other
      target:
        type: field_card
      action:
        type: remove_field_card
      constraints:
        - type: usage_limit_per_game
          limit: 1
        - type: no_retroactive
        - type: card_parity
          parity: odd
      usageLimit: 1

  - id: Zero
    effect:
      id: "basic:zero"
      trigger:
        type: on_game_start
      target:
        type: hand
      action:
        type: add_card_to_hand
        cardValue: 0
    exclusionCondition:
      type: selection_count_threshold
      min: 2

bugs:
  - id: Odd-Forbidden
    effect:
      id: "basic:oddForbidden"
      trigger:
        type: always
      target:
        type: all_players
      action:
        type: forbid_card_parity
        parity: odd
    removalCost:
      type: hand_card
      value: even
      amount: 1

  - id: Even-Forbidden
    effect:
      id: "basic:evenForbidden"
      trigger:
        type: always
      target:
        type: all_players
      action:
        type: forbid_card_parity
        parity: even
    removalCost:
      type: hand_card
      value: odd
      amount: 1

  - id: Stack-Forbidden
    effect:
      id: "basic:stackForbidden"
      trigger:
        type: always
      target:
        type: all_players
      action:
        type: forbid_stack
    removalCost:
      type: hp
      amount: 3

  - id: Aggro-Forbidden
    effect:
      id: "basic:aggroForbidden"
      trigger:
        type: always
      target:
        type: all_players
      action:
        type: invalidate_strategy
      constraints:
        - type: strategy_match
          strategyId: Aggro
    removalCost:
      type: hp
      amount: 3

  - id: Control-Forbidden
    effect:
      id: "basic:controlForbidden"
      trigger:
        type: always
      target:
        type: all_players
      action:
        type: invalidate_strategy
      constraints:
        - type: strategy_match
          strategyId: Control-Add
    removalCost:
      type: hp
      amount: 3

  - id: Hack-Forbidden
    effect:
      id: "basic:hackForbidden"
      trigger:
        type: always
      target:
        type: all_players
      action:
        type: invalidate_strategy
      constraints:
        - type: strategy_match
          strategyId: Hack
    removalCost:
      type: hp
      amount: 3

  - id: TrickStar-Forbidden
    effect:
      id: "basic:trickStarForbidden"
      trigger:
        type: always
      target:
        type: all_players
      action:
        type: invalidate_strategy
      constraints:
        - type: strategy_match
          strategyId: TrickStar
    removalCost:
      type: hp
      amount: 3

  - id: Value-Corruption
    effect:
      id: "basic:valueCorruption"
      trigger:
        type: always
      target:
        type: all_players
      action:
        type: override_card_value
        value: 10
    removalCost:
      type: composite
      costs:
        - type: hp
          amount: 1
        - type: hand_card
          value: any
          amount: 1

phases:
  - id: normal
    transitionConditions:
      - type: deck_empty
        to: showdown
      - type: card_zero_played
        to: raid

  - id: showdown
    transitionConditions: []

  - id: raid
    transitionConditions:
      - type: boss_hp_zero_or_less
        to: finished
      - type: all_players_hp_zero_or_less
        to: session_win_boss

winCondition:
  winsRequired: 3

initialConfig:
  recommendedPlayers: 4
  initialHandSize: 5
  initialHP: 10
  setNumberFormula: "gameIndex * 10"
